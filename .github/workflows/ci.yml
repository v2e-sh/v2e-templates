name: ci
on:
  pull_request:
  push:
    branches: [main]
# Least privilege: CI only reads the repo. Jobs raise their own scopes if ever needed.
permissions:
  contents: read
jobs:
  # Advisory: surfaces shell issues as warnings without blocking merges.
  # Drop the "|| echo" guard to make this blocking once the backlog is clear.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -x $(git ls-files '*.sh') || echo "::warning::shellcheck reported findings (advisory)"

  # Blocking: repo is currently secret-free; keep it that way.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so verified-secret scans can walk past commits
      - name: TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:3.95.8 \
            git file:///repo --only-verified --fail

  # Blocking: gitleaks pattern scan alongside TruffleHog (defense in depth).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml
