name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  # Advisory: surfaces shell issues as warnings without blocking merges.
  # Drop the "|| echo" guard to make this blocking once the backlog is clear.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -x $(git ls-files '*.sh') || echo "::warning::shellcheck reported findings (advisory)"

  # Blocking: repo is currently secret-free; keep it that way.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail

  # Blocking: gitleaks pattern scan alongside TruffleHog (defense in depth).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml
